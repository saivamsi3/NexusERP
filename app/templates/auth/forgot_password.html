{% extends "layouts/base.html" %}
{% block title %}Reset Password - NexusERP{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 glass-card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 text-gradient"><i class="bi bi-shield-lock"></i> Recover Password</h3>
                <p class="text-secondary text-center mb-4">Enter your username or email address and set your new password below.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username_or_email" class="form-label font-secondary">Username or Email</label>
                        <input type="text" class="form-control border-secondary bg-dark text-light" id="username_or_email" name="username_or_email" placeholder="e.g. admin or admin@nexuserp.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label font-secondary">New Password</label>
                        <input type="password" class="form-control border-secondary bg-dark text-light" id="new_password" name="new_password" placeholder="Min. 6 characters" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label font-secondary">Confirm New Password</label>
                        <input type="password" class="form-control border-secondary bg-dark text-light" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3 py-2 bg-gradient border-0 text-white">Reset Password</button>
                </form>
                <p class="text-center mt-4 mb-0"><a href="{{ url_for('auth.login') }}" class="text-accent link-underline-opacity-0 hover-link"><i class="bi bi-arrow-left"></i> Back to Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
